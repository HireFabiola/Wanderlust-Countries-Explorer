<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer type="module" src="./main.js"></script>
</head>

<body>
    <header>
        <div class="container py-5">
            <div class="d-flex justify-content-start align-items-center">
                <div class="logo">
                    <img id="logoImage" src="./images/WhiteLogo.png" height="200" alt="WanderLust logo">
                </div>

                <div class="theme-toggle-wrap d-flex align-items-center gap-2 ms-auto">
                    <i class="bi bi-sun-fill theme-icon"></i>

                    <div class="form-check form-switch m-0">
                        <input class="form-check-input theme-toggle-input" type="checkbox" id="themeToggle">
                    </div>

                    <i class="bi bi-moon-stars-fill theme-icon"></i>
                </div>
            </div>
        </div>
    </header>

    <main id="onLoadLayout">  <div class="container">
    <form id="searchForm" class="mb-3 position-relative">
      <input id="searchField" class="form-control" placeholder="Search a country...">
      <div id="countrySuggestions" class="list-group position-absolute w-100"></div>
    </form>

    <select id="regionFilter" class="form-select mb-3">
      <option value="">All regions</option>
      <option value="africa">Africa</option>
      <option value="americas">Americas</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
      <option value="oceania">Oceania</option>
    </select>

    <div id="travelCounter" class="mb-3"></div>
    <div id="visitedFilterContainer" class="mb-3"></div>
    <div id="visitedWorldMap" class="mb-4"></div>
    <div id="countryFlags" class="row g-3"></div>
  </div></main>
    <div id="newLayout" class="d-none"></div>
</body>

</html>
